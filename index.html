<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deriada Global Resources Limited - Your Premier Export & Import Partner in West Africa. Certified export company delivering premium hardwood charcoal, agricultural commodities, spices, and seamless global trade solutions." />
    <meta name="keywords" content="West Africa Export Company, Hardwood Charcoal Exporter, Ginger Export Nigeria, Import Services West Africa, Freight Forwarding Nigeria, Clearing and Forwarding Services" />
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#0F5132',
                secondary: '#198754',
                accent: '#D4A017',
                dark: '#1B1B1B',
                light: '#F8F9FA',
              }
            },
            fontFamily: {
              sans: ['Poppins', 'Inter', 'sans-serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'disintegrate': 'disintegrate 1s ease-out forwards',
              'assemble': 'assemble 1s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'fade-in-down': 'fadeInDown 0.8s ease-out forwards',
              'slide-in-left': 'slideInLeft 0.8s ease-out forwards',
              'slide-in-right': 'slideInRight 0.8s ease-out forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              disintegrate: {
                '0%': { opacity: 1, transform: 'scale(1)' },
                '100%': { opacity: 0, transform: 'scale(1.5)', filter: 'blur(4px)' },
              },
              assemble: {
                '0%': { opacity: 0, transform: 'scale(1.5)', filter: 'blur(4px)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              },
              fadeInUp: {
                '0%': { opacity: 0, transform: 'translateY(40px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: 0, transform: 'translateY(-40px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              slideInLeft: {
                '0%': { opacity: 0, transform: 'translateX(-60px)' },
                '100%': { opacity: 1, transform: 'translateX(0)' },
              },
              slideInRight: {
                '0%': { opacity: 0, transform: 'translateX(60px)' },
                '100%': { opacity: 1, transform: 'translateX(0)' },
              },
            },
          },
        },
      }
    </script>
    
    <title>Deriada Global Resources Limited | Elevating Exports, Expanding Horizons</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
